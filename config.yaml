# ============================================================================
# PENETRATION TESTING FRAMEWORK — CENTRALIZED CONFIGURATION
# ============================================================================
# Engagement: [Client Name] Penetration Test
# Target: [target-domain.com]
# ============================================================================

# --- Engagement Metadata ---
engagement:
  name: ""                                # e.g., "Acme Corp Penetration Test"
  id: ""                                  # e.g., "PT-2026-ACME-001"
  client: ""                              # e.g., "Acme Corp"
  application: ""                         # e.g., "Acme Web Platform"
  version: ""                             # To be determined during recon
  environment: "production"               # production | staging | development
  type: "penetration-test"
  start_date: ""                          # YYYY-MM-DD
  end_date: ""
  report_date: ""
  lead_tester: ""                         # Your name
  team: []

# --- Authorization ---
authorization:
  roe_signed: false                       # Must be true before testing
  roe_date: ""
  roe_reference: ""                       # Reference to signed ROE document
  emergency_contact:
    name: ""
    phone: ""
    email: ""
  tester_ips: []
  testing_window:
    timezone: "UTC"
    start_time: "00:00"
    end_time: "23:59"
    days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]

# --- Scope Definition ---
scope:
  in_scope:
    domains:
      - domain: ""                        # e.g., "target-domain.com"
        ip: ""
        notes: "Primary domain"
      - domain: ""                        # e.g., "*.target-domain.com"
        ip: ""
        notes: "All subdomains"
    features:
      - "Web application security"
      - "API security"
      - "Authentication and authorization"
      - "Input validation"
      - "Access controls"
      - "Data exposure"
    api_endpoints:
      - method: "GET"
        path: "/*"
        auth: "none"
        description: "Unauthenticated endpoint discovery"
  out_of_scope:
    domains: []
    actions:
      - "Distributed Denial of Service (DDoS) or volumetric attacks"
      - "Social engineering"
      - "Brute-force attacks"
      - "Destructive exploitation"
      - "Privacy violations, destruction of data, service degradation"
  constraints:
    production_data_access: false
    destructive_testing: false
    rate_limit_exception: false
    max_requests_per_second: 10

# --- Target Information ---
target:
  primary_domain: ""                      # e.g., "https://www.target-domain.com"
  base_url: ""                            # e.g., "https://www.target-domain.com"
  subdomains: []                          # To be discovered during recon
  third_party_integrations: []
  network:
    waf_detected: false                   # To be determined during recon
    waf_product: ""
    load_balancer: false
    cdn: false
    cdn_provider: ""
    reverse_proxy: false

# --- Technology Stack ---
# To be populated during Phase 1 (Reconnaissance) and Phase 2 (Enumeration)
tech_stack:
  backend:
    language: ""
    framework: ""
    web_server: ""
    version: ""
  frontend:
    framework: ""
    template_engine: ""
    css_framework: ""
    build_tool: ""
  database:
    type: ""
    orm: ""
    version: ""
  authentication:
    session_type: ""
    token_algorithm: ""
    mfa_present: false
    oauth_provider: ""
    sso_type: ""
  infrastructure:
    cloud_provider: ""
    container_platform: ""
    cdn: ""
    waf: ""
  file_upload:
    allowed: false
    storage_type: ""
    cdn_served: false
    direct_execution: false
    mime_validation: ""
  api:
    style: "REST"
    version: ""
    documentation: ""
    auth_method: ""

# --- Credentials ---
credentials:
  test_accounts:
    - role: "anonymous"
      username: ""
      password: ""
      notes: "Unauthenticated testing only"
  api_keys: []
  oauth:
    client_id: ""
    client_secret: ""
    redirect_uri: ""
    provider_accounts: []

# --- Testing Preferences ---
preferences:
  phases_to_run:
    recon: true
    enumeration: true
    exploitation: true
    post_exploitation: true
    reporting: true
  exploitation_modules:
    # Auth modules
    authentication: true
    authorization: true
    jwt_security: true
    oauth: true
    # Web modules
    xss: true
    sql_injection: true
    command_injection: true
    ssrf: true
    csrf: true
    file_upload: true
    path_traversal: true
    xxe: true
    ssti: true
    open_redirect: true
    html_injection: true
    # API modules
    rest_api: true
    graphql: false                        # Enable if GraphQL discovered
    websocket: false                      # Enable if WebSocket discovered
    mass_assignment: true
    # Infrastructure modules
    security_misconfig: true
    cors: true
    clickjacking: true
    http_smuggling: true
    cache_poisoning: true
    subdomain_takeover: true
    sensitive_data_exposure: true
    # Business logic modules
    business_logic: true
    rate_limiting: true
    idor: true
    privilege_escalation: true
  tool_settings:
    dirsearch_threads: 5
    dirsearch_delay: 0.5
    ffuf_rate: 10
    nuclei_rate_limit: 5
    sqlmap_level: 2
    sqlmap_risk: 1
    sqlmap_technique: "BT"
    max_request_rate: 10
  reporting:
    format: "markdown"
    include_executive_summary: true
    include_technical_report: true
    include_poc: true
    classification: "CONFIDENTIAL"
  agents:
    enabled: true
    run_order: "priority"                 # priority | sequential | parallel
    agents_to_run:
      agent_01_access_control: true       # A01 — Broken Access Control (CRITICAL)
      agent_02_cryptographic: true        # A02 — Cryptographic Failures (HIGH)
      agent_03_injection: true            # A03 — Injection (CRITICAL)
      agent_04_insecure_design: true      # A04 — Insecure Design (MEDIUM)
      agent_05_misconfiguration: true     # A05 — Security Misconfiguration (HIGH)
      agent_06_vulnerable_components: true  # A06 — Vulnerable Components (MEDIUM)
      agent_07_auth_failures: true        # A07 — Auth Failures (CRITICAL)
      agent_08_data_integrity: true       # A08 — Data Integrity Failures (HIGH)
      agent_09_logging: true              # A09 — Logging Failures (LOW)
      agent_10_ssrf: true                 # A10 — SSRF (HIGH)
  logging:
    level: "INFO"
    log_http_requests: true
    log_http_responses: true
    log_file: "logs/engagement.log"
    agent_log_file: "logs/agent_execution.log"
    evidence_dir: "evidence/"

# --- Gmail Notification Settings ---
notifications:
  gmail:
    enabled: false                         # Set to true to enable email notifications
    smtp_server: "smtp.gmail.com"
    smtp_port: 465
    sender_email: ""                       # Your Gmail address
    app_password: ""                       # Gmail App Password (https://myaccount.google.com/apppasswords)
    recipients:
      to: ""                               # Primary recipient
      cc: ""                               # CC recipient
      security_team: ""                    # For critical alerts
    send_on_critical: true                 # Auto-alert on critical findings
    send_on_complete: true                 # Send report on completion
    require_confirmation: true             # Require per-email user confirmation

# ============================================================================
# Fill in the fields above before starting the engagement.
# Run: python3 setup.py --validate  to check configuration
# Run: python3 run.py --dry-run     to preview planned actions
# ============================================================================
