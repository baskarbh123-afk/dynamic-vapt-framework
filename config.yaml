# ============================================================================
# PENETRATION TESTING FRAMEWORK — CENTRALIZED CONFIGURATION
# ============================================================================
# Engagement: Cloudonix Bug Bounty / Vulnerability Disclosure
# Policy Reference: Cloudonix Vulnerability Disclosure Policy
# Report to: security@cloudonix.io
# ============================================================================

# --- Engagement Metadata ---
engagement:
  name: "Cloudonix Staging Platform Penetration Test"
  id: "PT-2026-CLOUDONIX-001"
  client: "Cloudonix"
  application: "Cloudonix Platform (API, SIP, Cockpit)"
  version: ""                           # To be determined during recon
  environment: "staging"                # IMPORTANT: Only staging resources are authorized
  type: "bug-bounty"                    # Cloudonix Vulnerability Disclosure Program
  start_date: "2026-03-03"
  end_date: ""
  report_date: ""
  lead_tester: "Baskar"
  team: []

# --- Authorization ---
authorization:
  roe_signed: true                      # Authorized via Cloudonix Vulnerability Disclosure Policy
  roe_date: "2026-03-03"
  roe_reference: "Cloudonix Vulnerability Disclosure Policy — Public Bug Bounty Program"
  emergency_contact:
    name: "Cloudonix Security Team"
    phone: ""
    email: "security@cloudonix.io"
  tester_ips: []                        # No IP whitelisting required for staging
  testing_window:
    timezone: "UTC"
    start_time: "00:00"
    end_time: "23:59"
    days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]

# --- Scope Definition ---
scope:
  in_scope:
    domains:
      - domain: "api.staging.cloudonix.io"
        ip: ""
        notes: "Cloudonix API services (staging)"
      - domain: "api.cloudonix.io"
        ip: ""
        notes: "Cloudonix API services (production — test with caution, staging preferred)"
      - domain: "sip.staging.cloudonix.io"
        ip: ""
        notes: "Cloudonix SIP services (staging)"
      - domain: "wss.staging.cloudonix.io"
        ip: ""
        notes: "Cloudonix WebSocket SIP services (staging)"
      - domain: "*.sip.staging.cloudonix.io"
        ip: ""
        notes: "Cloudonix SIP wildcard subdomains (staging)"
      - domain: "*.staging.cloudonix.net"
        ip: ""
        notes: "Cloudonix staging net wildcard subdomains"
      - domain: "cockpit.staging.cloudonix.io"
        ip: ""
        notes: "Cloudonix Cockpit — primary testing endpoint"
    features:
      - "Cloudonix Cockpit web application"
      - "API authentication and authorization"
      - "Customer data access controls"
      - "SIP call creation and management"
      - "SIP session information disclosure"
      - "Cross-customer data isolation"
      - "Public vs non-public data access"
      - "Anonymous vs authenticated access controls"
    api_endpoints:
      - method: "GET"
        path: "/api/*"
        auth: "bearer"
        description: "Cloudonix REST API — staging"
      - method: "POST"
        path: "/api/*"
        auth: "bearer"
        description: "Cloudonix REST API — staging"
  out_of_scope:
    domains:
      - domain: "cloudonix.com"
        reason: "Commercial web property — no bounty awarded, non-mission-critical"
      - domain: "*.cloudonix.com (non-staging)"
        reason: "Production resources without staging designator are out of scope"
      - domain: "*.cloudonix.io (non-staging)"
        reason: "Production resources without staging designator are out of scope"
      - domain: "*.cloudonix.net (non-staging)"
        reason: "Production resources without staging designator are out of scope"
    actions:
      - "Distributed Denial of Service (DDoS) or volumetric attacks — never eligible"
      - "Social engineering without a fixable technical limitation"
      - "Automated scanner-only results without real exploit demonstration"
      - "AI-generated vulnerability reports without manual verification"
      - "Brute-forcing customer-controlled credentials"
      - "Circumventing third-party services (deemed lawful access by Cloudonix)"
      - "Testing on production/non-staging resources"
      - "Privacy violations, destruction of data, service degradation"
      - "Interacting with accounts not owned by the tester"
  constraints:
    production_data_access: false       # Only interact with your own staging accounts
    destructive_testing: false
    rate_limit_exception: false
    max_requests_per_second: 10

# --- Target Information ---
target:
  primary_domain: "https://cockpit.staging.cloudonix.io"
  base_url: "https://cockpit.staging.cloudonix.io"
  subdomains:
    - subdomain: "api.staging.cloudonix.io"
      purpose: "Cloudonix API services"
      in_scope: true
    - subdomain: "sip.staging.cloudonix.io"
      purpose: "Cloudonix SIP services"
      in_scope: true
    - subdomain: "wss.staging.cloudonix.io"
      purpose: "Cloudonix WebSocket SIP services"
      in_scope: true
    - subdomain: "cockpit.staging.cloudonix.io"
      purpose: "Cloudonix Cockpit web application"
      in_scope: true
    - subdomain: "api.cloudonix.io"
      purpose: "Cloudonix API services (production)"
      in_scope: true
  third_party_integrations: []
  network:
    waf_detected: false                 # To be determined during recon
    waf_product: ""
    load_balancer: false
    cdn: false
    cdn_provider: ""
    reverse_proxy: false

# --- Technology Stack ---
# To be populated during Phase 1 (Reconnaissance) and Phase 2 (Enumeration)
tech_stack:
  backend:
    language: ""
    framework: ""
    web_server: ""
    version: ""
  frontend:
    framework: ""
    template_engine: ""
    css_framework: ""
    build_tool: ""
  database:
    type: ""
    orm: ""
    version: ""
  authentication:
