    - role: "customer_b"
      username: ""
      password: ""
      notes: "Secondary test customer (for cross-customer isolation testing)"
  api_keys:
    - purpose: "Customer A API key"
      key: ""
      scope: ""
      expiry: ""
    - purpose: "Customer B API key"
      key: ""
      scope: ""
      expiry: ""
  oauth:
    client_id: ""
    client_secret: ""
    redirect_uri: ""
    provider_accounts: []

# --- Testing Preferences ---
preferences:
  phases_to_run:
    recon: true
    enumeration: true
    exploitation: true
    post_exploitation: true
    reporting: true
  exploitation_modules:
    # Auth modules — HIGH PRIORITY (core bounty targets)
    authentication: true
    authorization: true                 # Cross-customer data isolation
    jwt_security: true
    oauth: true
    # Web modules
    xss: true
    sql_injection: true
    command_injection: true
    ssrf: true
    csrf: true
    file_upload: true
    path_traversal: true
    xxe: true
    ssti: true
    open_redirect: true
    html_injection: false               # Cloudonix: HTML injections = $0 payout
    # API modules — HIGH PRIORITY (API is core service)
    rest_api: true
    graphql: false                      # Enable if GraphQL discovered
    websocket: true                     # WSS SIP services are in scope
    mass_assignment: true
    # Infrastructure modules
    security_misconfig: true
    cors: true
    clickjacking: false                 # Cloudonix: clickjacking = $0 payout
    http_smuggling: true
    cache_poisoning: true
    subdomain_takeover: true
    sensitive_data_exposure: true       # Cross-customer data exposure
    # Business logic modules
    business_logic: true
    rate_limiting: true
    idor: true                          # Cross-customer IDOR = High/Critical
    privilege_escalation: true
  tool_settings:
    dirsearch_threads: 5
    dirsearch_delay: 0.5
    ffuf_rate: 10
    nuclei_rate_limit: 5
    sqlmap_level: 2
    sqlmap_risk: 1
    sqlmap_technique: "BT"
    max_request_rate: 10
  reporting:
    format: "markdown"
    include_executive_summary: true
    include_technical_report: true
    include_poc: true
    classification: "CONFIDENTIAL"
  agents:
    enabled: true                       # Enable multi-agent execution
    run_order: "priority"               # priority | sequential | parallel
    agents_to_run:                      # Which agents to enable (by number)
      agent_01_access_control: true     # A01 — Broken Access Control (CRITICAL)
      agent_02_cryptographic: true      # A02 — Cryptographic Failures (HIGH)
      agent_03_injection: true          # A03 — Injection (CRITICAL)
      agent_04_insecure_design: true    # A04 — Insecure Design (MEDIUM)
      agent_05_misconfiguration: true   # A05 — Security Misconfiguration (HIGH)
      agent_06_vulnerable_components: true  # A06 — Vulnerable Components (MEDIUM)
      agent_07_auth_failures: true      # A07 — Auth Failures (CRITICAL)
      agent_08_data_integrity: true     # A08 — Data Integrity Failures (HIGH)
      agent_09_logging: true            # A09 — Logging Failures (LOW)
      agent_10_ssrf: true               # A10 — SSRF (HIGH)
  logging:
    level: "INFO"
    log_http_requests: true
    log_http_responses: true
    log_file: "logs/engagement.log"
    agent_log_file: "logs/agent_execution.log"
    evidence_dir: "evidence/"

# ============================================================================
# CLOUDONIX BOUNTY REFERENCE
# ============================================================================
# Severity    | CVSS Range  | Payout
# ------------|-------------|--------
# No Impact   | —           | $0      (scanner results, clickjacking, HTML injection)
# Low         | 0.1 – 3.9   | $5-25   (circumvention w/o access gain)
# Medium      | 4.0 – 6.9   | $25-50  (SIP anonymous call, storage name conflict)
# High        | 7.0 – 8.9   | $50-100 (cross-customer data disclosure/modification)
# Critical    | 9.0 – 10    | $100-500 (anonymous access to non-public data, DoS)
#
# Key bounty-eligible targets:
#   - Anonymous access to non-public customer data/metadata (Critical)
#   - Cross-customer data disclosure or modification (High)
#   - Anonymous modification of public customer data (High)
#   - Non-trivial DoS affecting other customers (Critical)
#   - SIP: anonymous call creation/termination (Medium)
#   - SIP: cross-customer session info disclosure (High)
#
# NOT eligible:
#   - Automated scanner results without real exploit demo
#   - AI-generated reports without manual verification
#   - DDoS/volumetric attacks
#   - Social engineering without technical limitation
#   - Guessing customer-controlled credentials
#   - Circumventing third-party services
#   - HTML injections, clickjacking, no-referrer issues
# ============================================================================
